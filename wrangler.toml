name = "ferret"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
MODEL = "deepseek-chat"
MAX_FETCHES = "10"   # tool-call budget per request — see AGENT.md "Tuning MAX_FETCHES" before changing
MAX_TOKENS = "4000"
DEFAULT_DEADLINE_MS = "120000"   # agent wraps up by this unless the request overrides deadline_ms

# Secrets (set via wrangler secret put):
#   wrangler secret put DEEPSEEK_API_KEY
#   wrangler secret put RAPIDAPI_KEY
#   wrangler secret put SCRAPE_DO_TOKEN       # optional — fallback scraper
#   wrangler secret put CF_ACCOUNT_ID         # optional — CF Browser Rendering
#   wrangler secret put CF_API_TOKEN          # optional — CF Browser Rendering
#   wrangler secret put WORKER_AUTH           # strongly recommended — an open endpoint is an open wallet
